<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f14" />
    <title>ExpenseApp • Phase 6</title>
    <meta
      name="description"
      content="ExpenseApp – Quản lý chi tiêu nội bộ • Firebase Hosting, Auth, Firestore."
    />

    <!-- Fonts (optional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
  </head>
  <body data-auth="guest" data-admin="0">
    <a
      href="#app-root"
      style="
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
      >Bỏ qua điều hướng</a
    >

    <!-- Header / Navbar -->
    <header class="nav">
      <div class="brand">
        <div class="logo" aria-hidden>₫</div>
        <div>
          <strong>ExpenseApp</strong>
          <div class="muted small">Firebase • Auth • Firestore</div>
        </div>
      </div>
      <nav class="row" aria-label="Điều hướng chính">
        <span id="admin-badge" class="admin-badge hidden">Admin</span>

        <!-- App routes (hash) -->
        <button class="btn" data-link="#/welcome">Trang chào</button>
        <button class="btn" data-link="#/add" data-auth-required>
          Thêm khoản chi
        </button>
        <button class="btn" data-link="#/debts" data-auth-required>
          Bảng nợ
        </button>
        <button class="btn" data-link="#/pay-debt" data-auth-required>
          Thanh toán nợ
        </button>
        <button class="btn" data-link="#/mine" data-auth-required>
          Yêu cầu của tôi
        </button>
        <button data-link="#/history" class="btn" data-auth-required>
          Lịch sử
        </button>
        <button class="btn" data-link="#/users" data-auth-required>
          Thành viên
        </button>
        <button class="btn" data-link="#/admin/queue" data-admin-only>
          Admin
        </button>

        <!-- Auth actions -->
        <button id="btn-login" class="btn primary">Đăng nhập Google</button>
        <button id="btn-logout" class="btn hidden" data-auth-required>
          Đăng xuất
        </button>
      </nav>
    </header>

    <!-- Main outlet -->
    <main id="app-root" class="container" role="main"></main>

    <!-- Footer / user info -->
    <footer class="footer" role="contentinfo">
      <div class="userbox" aria-live="polite">
        <img id="user-photo" class="avatar" alt="Ảnh người dùng" />
        <div>
          <div><strong id="user-name">Khách</strong></div>
          <div class="muted small">
            <span id="user-email">—</span> • <span id="user-uid">—</span>
          </div>
        </div>
      </div>
    </footer>

    <noscript>
      <div style="margin: 12px; color: #ffb86b; text-align: center">
        Trình duyệt cần bật JavaScript để sử dụng ứng dụng.
      </div>
    </noscript>

    <!-- App entry -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
